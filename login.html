<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IncentiveQuiz — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }

        body {
            background-color: #0a0a14;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            display: none;
            background-color: #0d0d1f;
            border: 1px solid #1e1e3a;
            border-radius: 24px;
            padding: 48px 40px;
            width: 420px;
            text-align: center;
        }

        .logo {
            font-size: 26px;
            font-weight: 800;
            color: #a78bfa;
            margin-bottom: 6px;
        }

        .logo span { color: white; }

        .subtitle {
            color: #555;
            font-size: 14px;
            margin-bottom: 36px;
        }

        .tabs {
            display: flex;
            background-color: #0a0a14;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 28px;
            border: 1px solid #1e1e3a;
        }

        .tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: #666;
            font-size: 15px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .tab.active {
            background-color: #a78bfa;
            color: white;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 14px;
            background-color: #0a0a14;
            border: 1px solid #1e1e3a;
            border-radius: 10px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: #a78bfa; }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #a78bfa;
            color: white;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 6px;
            transition: all 0.2s;
        }

        .submit-btn:hover { background-color: #7c3aed; }
        .submit-btn:disabled {
            background-color: #3a3a6a;
            cursor: not-allowed;
        }

        .error-msg {
            background-color: #2a0d0d;
            border: 1px solid #f87171;
            color: #f87171;
            font-size: 13px;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 14px;
            display: none;
            text-align: left;
        }

        .success-msg {
            background-color: #0d2a1a;
            border: 1px solid #4ade80;
            color: #4ade80;
            font-size: 13px;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 14px;
            display: none;
            text-align: left;
        }

        .google-btn {
            width: 100%;
            padding: 13px;
            background-color: #fff;
            color: #333;
            font-size: 15px;
            font-weight: 600;
            border: 1px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
        }
        .google-btn:hover { background-color: #f5f5f5; border-color: #bbb; }
        .google-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .forgot-link {
            display: block;
            text-align: right;
            margin-top: -6px;
            margin-bottom: 12px;
            color: #a78bfa;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.2s;
        }
        .forgot-link:hover { color: #7c3aed; }

        .reset-back {
            display: block;
            margin-top: 12px;
            color: #555;
            font-size: 13px;
            cursor: pointer;
            text-align: center;
        }
        .reset-back:hover { color: #a78bfa; }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: #333;
            font-size: 13px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: #1e1e3a;
        }

        .back-home {
            display: block;
            margin-top: 24px;
            color: #555;
            font-size: 13px;
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-home:hover { color: #a78bfa; }
    </style>
</head>
<body>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>

    <div class="card">
        <div class="logo">⚡ Incentive<span>Quiz</span></div>
        <div class="subtitle">Free to play. Built for champions.</div>

        <div class="tabs" id="auth-tabs">
            <button class="tab active" id="tab-login" onclick="switchTab('login')">Login</button>
            <button class="tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <div class="error-msg" id="error-msg"></div>
        <div class="success-msg" id="success-msg"></div>

        <!-- LOGIN / SIGNUP FORM -->
        <div id="form-view">
            <input type="text" id="username" placeholder="Username" style="display:none" />
            <input type="email" id="email" placeholder="Email address" />
            <input type="password" id="password" placeholder="Password" />
            <span class="forgot-link" id="forgot-link" onclick="showResetView()">Forgot password?</span>
            <input type="password" id="confirm-password" placeholder="Confirm Password" style="display:none" />

            <button class="submit-btn" id="submit-btn" onclick="handleSubmit()">Login</button>

            <div class="divider">or</div>

            <button class="google-btn" id="google-btn" onclick="handleGoogleSignIn()">
                <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
                Continue with Google
            </button>
        </div>

        <!-- RESET PASSWORD VIEW -->
        <div id="reset-view" style="display:none">
            <p style="color:#888;font-size:13px;margin-bottom:16px;text-align:left">Enter your email and we'll send you a password reset link.</p>
            <input type="email" id="reset-email" placeholder="Email address" />
            <button class="submit-btn" id="reset-btn" onclick="handlePasswordReset()">Send Reset Link</button>
            <span class="reset-back" onclick="hideResetView()">← Back to Login</span>
        </div>

        <a href="index.html" class="back-home">← Back to Home</a>
    </div>

    <script>
        let currentTab = 'login';

        auth.onAuthStateChanged(user => {
            if (user) {
                window.location.href = 'dashboard.html';
            } else {
                document.querySelector('.card').style.display = 'block';
            }
        });

        // ── FORGOT PASSWORD VIEWS ──
        function showResetView() {
            clearMessages();
            document.getElementById('form-view').style.display = 'none';
            document.getElementById('auth-tabs').style.display = 'none';
            document.getElementById('reset-view').style.display = 'block';
            document.querySelector('.subtitle').textContent = 'Reset your password';
        }

        function hideResetView() {
            clearMessages();
            document.getElementById('reset-view').style.display = 'none';
            document.getElementById('auth-tabs').style.display = 'flex';
            document.getElementById('form-view').style.display = 'block';
            document.querySelector('.subtitle').textContent = 'Free to play. Built for champions.';
        }

        function handlePasswordReset() {
            const email = document.getElementById('reset-email').value.trim();
            if (!email) { showError('Please enter your email address.'); return; }
            const btn = document.getElementById('reset-btn');
            btn.disabled = true;
            btn.textContent = 'Sending...';
            auth.sendPasswordResetEmail(email)
                .then(function() {
                    showSuccess('Reset link sent! Check your email inbox (and spam folder).');
                    btn.textContent = '✅ Sent';
                })
                .catch(function(err) {
                    btn.disabled = false;
                    btn.textContent = 'Send Reset Link';
                    if (err.code === 'auth/user-not-found') {
                        showError('No account found with this email.');
                    } else {
                        showError(err.message);
                    }
                });
        }

        // ── GOOGLE SIGN-IN ──
        function handleGoogleSignIn() {
            clearMessages();
            const btn = document.getElementById('google-btn');
            btn.disabled = true;
            btn.innerHTML = '<span>Signing in...</span>';
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then(function(result) {
                    const user = result.user;
                    // Check if this is a new user
                    return db.collection('users').doc(user.uid).get().then(function(doc) {
                        if (!doc.exists) {
                            // New Google user — create profile
                            var username = user.displayName
                                ? user.displayName.replace(/\s+/g, '').substring(0, 20)
                                : 'Player' + Math.floor(Math.random() * 9999);
                            return db.collection('users').doc(user.uid).set({
                                username: username,
                                email: user.email,
                                games: 0, wins: 0, best: 0, streak: 0,
                                createdAt: firebase.firestore.FieldValue.serverTimestamp()
                            }).then(function() {
                                localStorage.setItem('iqUsername', username);
                                localStorage.setItem('iqUID', user.uid);
                            });
                        } else {
                            localStorage.setItem('iqUsername', doc.data().username);
                            localStorage.setItem('iqUID', user.uid);
                        }
                    });
                })
                .then(function() {
                    window.location.href = 'dashboard.html';
                })
                .catch(function(err) {
                    btn.disabled = false;
                    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg> Continue with Google';
                    if (err.code === 'auth/popup-closed-by-user') return;
                    if (err.code === 'auth/popup-blocked') {
                        showError('Popup blocked. Please allow popups for this site.');
                    } else {
                        showError(err.message);
                    }
                });
        }

        function switchTab(tab) {
            currentTab = tab;
            clearMessages();
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
            document.getElementById('username').style.display = tab === 'signup' ? 'block' : 'none';
            document.getElementById('confirm-password').style.display = tab === 'signup' ? 'block' : 'none';
            document.getElementById('forgot-link').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('submit-btn').textContent = tab === 'login' ? 'Login' : 'Create Account';
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('success-msg').style.display = 'none';
        }

        function showSuccess(msg) {
            const el = document.getElementById('success-msg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('error-msg').style.display = 'none';
        }

        function clearMessages() {
            document.getElementById('error-msg').style.display = 'none';
            document.getElementById('success-msg').style.display = 'none';
        }

        function setLoading(loading) {
            const btn = document.getElementById('submit-btn');
            btn.disabled = loading;
            btn.textContent = loading
                ? 'Please wait...'
                : (currentTab === 'login' ? 'Login' : 'Create Account');
        }

        async function handleSubmit() {
            clearMessages();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!email || !password) {
                showError('Please fill in all fields.');
                return;
            }

            if (currentTab === 'signup') {
                const username = document.getElementById('username').value.trim();
                const confirm = document.getElementById('confirm-password').value.trim();

                if (!username) { showError('Please enter a username.'); return; }
                if (username.length < 3) { showError('Username must be at least 3 characters.'); return; }
                if (!/^[a-zA-Z0-9_]+$/.test(username)) { showError('Username can only contain letters, numbers and underscores.'); return; }
                if (password !== confirm) { showError('Passwords do not match.'); return; }
                if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }

                setLoading(true);

                // ── CHECK USERNAME UNIQUENESS ──
                try {
                    const existingSnap = await db.collection('users')
                        .where('username', '==', username)
                        .limit(1)
                        .get();

                    if (!existingSnap.empty) {
                        setLoading(false);
                        showError('Username "' + username + '" is already taken. Please choose another.');
                        return;
                    }
                } catch(e) {
                    // If uniqueness check fails (e.g. no index), proceed anyway
                    console.log('Uniqueness check error:', e);
                }

                try {
                    // Create account
                    const result = await auth.createUserWithEmailAndPassword(email, password);

                    // Save username to Firestore
                    await db.collection('users').doc(result.user.uid).set({
                        username: username,
                        email: email,
                        games: 0,
                        wins: 0,
                        best: 0,
                        streak: 0,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    // Save username to localStorage for quick access
                    localStorage.setItem('iqUsername', username);
                    localStorage.setItem('iqUID', result.user.uid);

                    showSuccess('Account created! Taking you to dashboard...');
                    setTimeout(() => window.location.href = 'dashboard.html', 1000);

                } catch (err) {
                    setLoading(false);
                    if (err.code === 'auth/email-already-in-use') {
                        showError('This email is already registered. Try logging in.');
                    } else {
                        showError(err.message);
                    }
                }

            } else {
                setLoading(true);
                try {
                    const result = await auth.signInWithEmailAndPassword(email, password);

                    // Load username from Firestore
                    const doc = await db.collection('users').doc(result.user.uid).get();
                    if (doc.exists) {
                        localStorage.setItem('iqUsername', doc.data().username);
                        localStorage.setItem('iqUID', result.user.uid);
                    }

                    window.location.href = 'dashboard.html';

                } catch (err) {
                    setLoading(false);
                    if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
                        showError('Wrong email or password. Please try again.');
                    } else {
                        showError(err.message);
                    }
                }
            }
        }
        
    </script>

</body>
</html>
